<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Rajdhani', sans-serif;
      color: #fff;
      position: relative;
    }

    /* Full-screen background image */
    .bg {
      position: fixed;
      inset: 0;
      background: url('assets/Game_Front.png') center/80% no-repeat;
      background-color: #000;
      z-index: 0;
    }

    /* Dark overlay for readability */
    .overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(0, 0, 0, 0.55) 0%,
        rgba(0, 0, 0, 0.75) 100%
      );
      z-index: 1;
    }

    /* Content */
    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
      max-width: 720px;
      animation: fadeUp 1.2s ease-out both;
    }

    .badge {
      display: inline-block;
      padding: 0.35rem 1.2rem;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 999px;
      font-size: 0.85rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      backdrop-filter: blur(6px);
      background: rgba(255, 255, 255, 0.08);
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: 4px;
      text-shadow: 0 0 30px rgba(0, 170, 255, 0.4);
      margin-bottom: 1rem;
    }

    h1 span {
      display: block;
      background: linear-gradient(135deg, #00d4ff, #7b2ff7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      font-weight: 300;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    /* Countdown */
    .countdown {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
    }

    .countdown .box {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      padding: 1rem 1.4rem;
      min-width: 90px;
      text-align: center;
    }

    .countdown .num {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      display: block;
      background: linear-gradient(135deg, #00d4ff, #7b2ff7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .countdown .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 0.25rem;
    }

    /* Notify form */
    .notify-form {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .notify-form input[type="email"] {
      padding: 0.75rem 1.2rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(6px);
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      outline: none;
      width: 280px;
      transition: border-color 0.3s;
    }

    .notify-form input[type="email"]::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .notify-form input[type="email"]:focus {
      border-color: #00d4ff;
    }

    .notify-form button {
      padding: 0.75rem 1.6rem;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #00d4ff, #7b2ff7);
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.3s, transform 0.2s;
    }

    .notify-form button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .contact {
      margin-top: 2rem;
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.55);
    }

    .contact a {
      color: #00d4ff;
      text-decoration: none;
      transition: color 0.3s;
    }

    .contact a:hover {
      color: #7b2ff7;
    }

    /* Animations */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Floating particles (decoration) */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .particles span {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(0, 212, 255, 0.5);
      border-radius: 50%;
      animation: float linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="overlay"></div>

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <div class="content">
    <div class="badge">Under Construction</div>
    <h1><span>Coming Soon</span></h1>
    <p class="tagline">We're working hard to bring you something amazing.<br />Stay tuned for the big reveal!</p>

    <div class="countdown" id="countdown">
      <div class="box"><span class="num" id="days">00</span><span class="label">Days</span></div>
      <div class="box"><span class="num" id="hours">00</span><span class="label">Hours</span></div>
      <div class="box"><span class="num" id="minutes">00</span><span class="label">Minutes</span></div>
      <div class="box"><span class="num" id="seconds">00</span><span class="label">Seconds</span></div>
    </div>

    <form class="notify-form" onsubmit="handleNotify(event)">
      <input type="email" placeholder="Enter your email" required />
      <button type="submit">Notify Me</button>
    </form>

    <p class="contact">Questions? Reach us at <a href="mailto:gulan-perish@outlook.com">gulan-perish@outlook.com</a></p>
  </div>

  <script>
    // --- Countdown Timer (set your launch date here) ---
    const launchDate = new Date('2026-06-01T00:00:00');

    function updateCountdown() {
      const now = new Date();
      const diff = launchDate - now;

      if (diff <= 0) {
        document.getElementById('days').textContent = '00';
        document.getElementById('hours').textContent = '00';
        document.getElementById('minutes').textContent = '00';
        document.getElementById('seconds').textContent = '00';
        return;
      }

      const d = Math.floor(diff / (1000 * 60 * 60 * 24));
      const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const m = Math.floor((diff / (1000 * 60)) % 60);
      const s = Math.floor((diff / 1000) % 60);

      document.getElementById('days').textContent = String(d).padStart(2, '0');
      document.getElementById('hours').textContent = String(h).padStart(2, '0');
      document.getElementById('minutes').textContent = String(m).padStart(2, '0');
      document.getElementById('seconds').textContent = String(s).padStart(2, '0');
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    // --- Notify button ---
    function handleNotify(e) {
      e.preventDefault();
      const input = e.target.querySelector('input');
      alert('Thanks! We\'ll notify ' + input.value + ' when we launch.');
      input.value = '';
    }

    // --- Floating particles ---
    (function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 30; i++) {
        const span = document.createElement('span');
        span.style.left = Math.random() * 100 + '%';
        span.style.animationDuration = (6 + Math.random() * 10) + 's';
        span.style.animationDelay = Math.random() * 8 + 's';
        span.style.width = span.style.height = (2 + Math.random() * 3) + 'px';
        container.appendChild(span);
      }
    })();
  </script>
</body>
</html>
