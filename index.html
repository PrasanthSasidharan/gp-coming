  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;

    /* Slideshow carousel */
    .slideshow-wrapper {
      position: relative;
      width: 100%;
      max-width: 600px;
      margin: 0 auto 2rem;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.12);
      background: #1a0010;
    }

    .slideshow {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
    }

    .slideshow img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1.2s ease-in-out;
    }

    .slideshow img.active {
      opacity: 1;
    }

    /* Slideshow navigation arrows */
    .slide-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 3;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      font-size: 1.4rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }

    .slide-arrow:hover {
      background: rgba(128, 0, 32, 0.7);
    }

    .slide-arrow.prev { left: 10px; }
    .slide-arrow.next { right: 10px; }

    /* Slideshow dots */
    .slide-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 12px 0;
      background: rgba(0, 0, 0, 0.3);
    }

    .slide-dots span {

      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;
    }

    .slide-dots span.active {

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <main class="content">

    <p class="tagline">We're working hard to bring you something amazing.<br />Stay tuned for the big reveal!</p>

    <!-- Slideshow carousel -->
    <div class="slideshow-wrapper">
      <div class="slideshow" id="slideshow">
        <img src="assets/Game_Front.png" class="active" alt="Twenty-Eight card game front cover" />
        <img src="assets/1.png" alt="Twenty-Eight card game screenshot 1" />
        <img src="assets/2.png" alt="Twenty-Eight card game screenshot 2" />
        <img src="assets/3.png" alt="Twenty-Eight card game screenshot 3" />
        <img src="assets/4.png" alt="Twenty-Eight card game screenshot 4" />
      </div>

      <div class="slide-dots" id="slideDots">
        <span class="active" onclick="goToSlide(0)"></span>
        <span onclick="goToSlide(1)"></span>
        <span onclick="goToSlide(2)"></span>
        <span onclick="goToSlide(3)"></span>
        <span onclick="goToSlide(4)"></span>
      </div>
    </div>

    <div class="countdown" id="countdown">
      <div class="box"><span class="num" id="days">00</span><span class="label">Days</span></div>
      <div class="box"><span class="num" id="hours">00</span><span class="label">Hours</span></div>
      <div class="box"><span class="num" id="minutes">00</span><span class="label">Minutes</span></div>
      <div class="box"><span class="num" id="seconds">00</span><span class="label">Seconds</span></div>
    </div>

    <p class="contact">Questions? Reach us at <a href="mailto:gulan-perish@outlook.com">gulan-perish@outlook.com</a></p>
  </main>

  <script>
    // --- Countdown Timer (set your launch date here) ---
    const launchDate = new Date('2026-06-01T00:00:00');

    function updateCountdown() {
      const now = new Date();
      const diff = launchDate - now;

      if (diff <= 0) {
        document.getElementById('days').textContent = '00';
        document.getElementById('hours').textContent = '00';
        document.getElementById('minutes').textContent = '00';
        document.getElementById('seconds').textContent = '00';
        return;
      }

      const d = Math.floor(diff / (1000 * 60 * 60 * 24));
      const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const m = Math.floor((diff / (1000 * 60)) % 60);
      const s = Math.floor((diff / 1000) % 60);

      document.getElementById('days').textContent = String(d).padStart(2, '0');
      document.getElementById('hours').textContent = String(h).padStart(2, '0');
      document.getElementById('minutes').textContent = String(m).padStart(2, '0');
      document.getElementById('seconds').textContent = String(s).padStart(2, '0');
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    // --- Slideshow ---
    const slides = document.querySelectorAll('#slideshow img');
    const dots = document.querySelectorAll('#slideDots span');
    let currentSlide = 0;
    let autoTimer;

    function showSlide(index) {
      slides[currentSlide].classList.remove('active');
      dots[currentSlide].classList.remove('active');
      currentSlide = (index + slides.length) % slides.length;
      slides[currentSlide].classList.add('active');
      dots[currentSlide].classList.add('active');
    }

    function changeSlide(dir) {
      showSlide(currentSlide + dir);
      resetAutoPlay();
    }

    function goToSlide(index) {
      showSlide(index);
      resetAutoPlay();
    }

    function resetAutoPlay() {
      clearInterval(autoTimer);
      autoTimer = setInterval(() => showSlide(currentSlide + 1), 4000);
    }

    resetAutoPlay();

    // --- Floating particles ---
    (function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 30; i++) {
        const span = document.createElement('span');
        span.style.left = Math.random() * 100 + '%';
        span.style.animationDuration = (6 + Math.random() * 10) + 's';
        span.style.animationDelay = Math.random() * 8 + 's';
        span.style.width = span.style.height = (2 + Math.random() * 3) + 'px';
        container.appendChild(span);
      }
    })();
  </script>
